<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiLanguage - Learning Path</title>
    <link rel="icon" type="image/png" href="HaiLanguageLogoSmall1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; font-weight: 400; background-color: #fcfcfc; margin: 0; padding: 0; color: #333; padding-bottom: 120px; }
        .app-header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 40px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; }
        .logo-link { text-decoration: none; display: inline-block; transition: transform 0.2s ease; }
        .logo-link:hover { transform: scale(1.02); }
        .logo-link img { max-height: 40px; width: auto; display: block; }
        .secondary-btn { background-color: transparent; color: #4285f4; border: 2px solid #4285f4; border-radius: 12px; padding: 8px 16px; font-size: 16px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s ease; }
        .secondary-btn:hover { background-color: #4285f4; color: white; }

        .streak-container { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; color: #ff9800; background-color: #fff3e0; padding: 8px 16px; border-radius: 20px; border: 2px solid #ffe0b2; transition: transform 0.2s ease; cursor: default; }
        .streak-container:hover { transform: scale(1.05); }

        .path-container { position: relative; max-width: 600px; margin: 120px auto 0 auto; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .path-header { text-align: center; margin-bottom: 20px; }
        .path-header h1 { font-size: 32px; font-weight: 600; letter-spacing: -1px; margin: 0; text-transform: capitalize;}
        .path-header p { color: #888; margin-top: 5px; font-weight: 400; }
        
        .path-container::before { content: ''; position: absolute; top: 120px; bottom: 40px; left: 50%; width: 8px; background-color: #e5e5e5; transform: translateX(-50%); z-index: 0; border-radius: 4px; }
        
        .node-wrapper { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .node-wrapper:nth-child(even) { padding-left: 160px; }
        .node-wrapper:nth-child(odd) { padding-right: 160px; }
        .node-wrapper:nth-child(1) { padding: 0; }

        /* Level Name Tags */
        .level-label { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; text-align: center;}

        .path-node { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: 700; text-decoration: none; transition: all 0.2s ease; }
        
        /* Node States */
        .node-completed { background-color: #58cc02; color: white; border: 4px solid #46a302; box-shadow: 0 6px 0 #46a302; }
        .node-completed:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #46a302; }
        
        .node-active { background-color: #4285f4; color: white; border: 4px solid #3367d6; box-shadow: 0 6px 0 #3367d6, 0 0 20px rgba(66,133,244,0.4); animation: pulse-blue 2s infinite; }
        .node-active:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #3367d6, 0 0 25px rgba(66,133,244,0.6); }
        
        /* NEW: Failed Node State */
        .node-failed { background-color: #ff4b4b; color: white; border: 4px solid #d32f2f; box-shadow: 0 6px 0 #d32f2f, 0 0 20px rgba(255, 75, 75, 0.4); animation: pulse-red 1.5s infinite; }
        .node-failed:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #d32f2f, 0 0 25px rgba(255, 75, 75, 0.6); }

        .node-locked { background-color: #e5e5e5; color: #a5a5a5; border: 4px solid #ccc; box-shadow: 0 6px 0 #ccc; cursor: not-allowed; }

        @keyframes pulse-blue { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        @media (max-width: 768px) { .app-header { padding: 15px 20px; } }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="index.html" class="logo-link"><img src="HaiLanguageLogoFull.png" alt="HaiLanguage Logo"></a>
        <a href="usercourses.html" class="secondary-btn">My Courses</a>
    </header>

    <main class="path-container" id="dynamicPath"></main>

    <script>
        function buildMap() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentTopic = urlParams.get('topic');

            if (!currentTopic) return window.location.href = 'usercourses.html';

            const safeTopicKey = 'hai_quiz_' + currentTopic.toLowerCase();
            const courseLevels = JSON.parse(localStorage.getItem(safeTopicKey) || '[]');
            
            // Get user's progress and check if they failed their last attempt
            let progress = parseInt(localStorage.getItem('hai_progress_' + currentTopic.toLowerCase())) || 0;
            let failedLevel = parseInt(localStorage.getItem('hai_failed_' + currentTopic.toLowerCase())) || -1;

            const pathContainer = document.getElementById('dynamicPath');
            
            pathContainer.innerHTML = `
                <div class="node-wrapper">
                    <div class="path-header">
                        <h1>${currentTopic}</h1>
                        <p>Course Progress: ${progress}/${courseLevels.length} Units</p>
                    </div>
                </div>
            `;

            // Draw the nodes
            courseLevels.forEach((levelData, index) => {
                let nodeHtml = '';
                let label = levelData.levelTitle || `Unit ${index + 1}`;
                
                if (index < progress) {
                    nodeHtml = `<div class="node-wrapper"><div class="level-label">${label}</div><a href="course.html?topic=${encodeURIComponent(currentTopic)}&lvl=${index}" class="path-node node-completed">⭐</a></div>`;
                } else if (index === progress) {
                    // Check if they failed this level!
                    if (failedLevel === index) {
                        nodeHtml = `<div class="node-wrapper"><div class="level-label" style="color:#ff4b4b;">FAILED - RETRY!</div><a href="course.html?topic=${encodeURIComponent(currentTopic)}&lvl=${index}" class="path-node node-failed">${index + 1}</a></div>`;
                    } else {
                        nodeHtml = `<div class="node-wrapper"><div class="level-label" style="color:#4285f4;">UP NEXT</div><a href="course.html?topic=${encodeURIComponent(currentTopic)}&lvl=${index}" class="path-node node-active">${index + 1}</a></div>`;
                    }
                } else {
                    nodeHtml = `<div class="node-wrapper"><div class="level-label" style="color:#aaa;">LOCKED</div><a href="#" class="path-node node-locked">${index + 1}</a></div>`;
                }
                pathContainer.innerHTML += nodeHtml;
            });

            if (progress >= courseLevels.length && courseLevels.length > 0) {
                pathContainer.innerHTML += `<div class="node-wrapper"><div class="path-header"><h2 style="color:#58cc02; background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid #58cc02; margin-top:20px;">Course Complete! 🏆</h2></div></div>`;
            }
        }
        buildMap();
    </script>
</body>
</html>
