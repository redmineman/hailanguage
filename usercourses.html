<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiLanguage - My Courses</title>
    <link rel="icon" type="image/png" href="HaiLanguageLogoSmall1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; font-weight: 400; background-color: #fcfcfc; margin: 0; padding: 0; color: #333; padding-bottom: 60px; }
        .content-wrapper { width: 100%; max-width: 900px; margin: 110px auto 0 auto; padding: 0 20px; box-sizing: border-box; }
        .app-header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 40px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; }
        .logo-link { text-decoration: none; display: inline-block; transition: transform 0.2s ease; }
        .logo-link:hover { transform: scale(1.02); }
        .logo-link img { max-height: 40px; width: auto; display: block; }
        .streak-container { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; color: #ff9800; background-color: #fff3e0; padding: 8px 16px; border-radius: 20px; border: 2px solid #ffe0b2; transition: transform 0.2s ease; cursor: default; }
        .streak-container:hover { transform: scale(1.05); }
        .streak-icon { font-size: 22px; }
        .section-header { font-size: 28px; font-weight: 600; letter-spacing: -1px; margin: 0 0 20px 0; color: #111; }
        .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 60px; }
        .course-card { background-color: white; border: 2px solid #e5e5e5; border-radius: 20px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: all 0.3s ease; position: relative; overflow: hidden; min-height: 180px; cursor: pointer; }
        .course-icon-bg { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 15px; background-color: #f0f4ff; }
        .course-title { font-size: 20px; font-weight: 600; margin: 0; text-transform: capitalize; }
        .course-card:hover { transform: translateY(-5px); border-color: #4285f4; box-shadow: 0 10px 20px rgba(66, 133, 244, 0.15); }
        .course-card.empty-slot { background-color: #f9f9f9; border: 2px dashed #ccc; box-shadow: none; cursor: pointer; }
        .course-card.empty-slot .course-icon-bg { background-color: #fff; border: 2px solid #ccc; color: #ccc; font-size: 28px; }
        .course-card.empty-slot:hover { border-color: #4285f4; background-color: #f0f4ff; transform: translateY(-5px); }
        .course-card.empty-slot:hover .course-icon-bg { border-color: #4285f4; color: #4285f4; }
        .course-card.blank-slot { background-color: transparent; border: 2px dashed #e5e5e5; box-shadow: none; cursor: default; }
        .course-card.blank-slot:hover { transform: none; box-shadow: none; border-color: #e5e5e5;}
        .levels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .level-card { background-color: white; border: 2px solid #e5e5e5; border-radius: 16px; padding: 25px 20px; text-align: center; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
        .level-card.blank-slot { background-color: transparent; border: 2px dashed #e5e5e5; box-shadow: none; cursor: default; min-height: 90px; }
        .level-card.blank-slot:hover { transform: none; box-shadow: none; border-color: #e5e5e5; background-color: transparent; }
        @media (max-width: 768px) { .app-header { padding: 15px 20px; } .courses-grid { grid-template-columns: 1fr 1fr; } .levels-grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .courses-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="index.html" class="logo-link"><img src="HaiLanguageLogoFull.png" alt="HaiLanguage Logo"></a>
        <div class="streak-container" id="streakWidget" title="Your Daily Streak"><span class="streak-icon">🔥</span><span id="streakCount">0</span></div>
    </header>

    <div class="content-wrapper">
        <h2 class="section-header">Your Courses</h2>
        <div class="courses-grid" id="dynamicCoursesGrid"></div>
        <h2 class="section-header">Course Levels</h2>
        <div class="levels-grid">
            <div class="level-card blank-slot"></div>
            <div class="level-card blank-slot"></div>
            <div class="level-card blank-slot"></div>
        </div>
    </div>

    <script>
        function loadSavedCourses() {
            const gridContainer = document.getElementById('dynamicCoursesGrid');
            const savedCourses = JSON.parse(localStorage.getItem('hai_savedCourses')) || [];
            gridContainer.innerHTML = '';
            const coursesToShow = savedCourses.slice(0, 5);

            coursesToShow.forEach(course => {
                // IMPORTANT FIX: Now links to courseselect.html map instead of directly to quiz!
                gridContainer.innerHTML += `
                    <a href="courseselect.html?topic=${encodeURIComponent(course.topic)}" class="course-card">
                        <div class="course-icon-bg">${course.icon}</div>
                        <h3 class="course-title">${course.topic}</h3>
                    </a>
                `;
            });

            gridContainer.innerHTML += `
                <a href="generator.html" class="course-card empty-slot" style="text-decoration: none;">
                    <div class="course-icon-bg">➕</div>
                    <h3 class="course-title" style="color: #666;">Add Course</h3>
                </a>
            `;

            const totalCardsDrawn = coursesToShow.length + 1; 
            for(let i = totalCardsDrawn; i < 6; i++) {
                gridContainer.innerHTML += `<div class="course-card blank-slot"></div>`;
            }
        }

        const STREAK_DAY_MS = 2 * 60 * 1000; 
        function checkAndUpdateStreak() {
            let currentStreak = parseInt(localStorage.getItem('hai_streakCount')) || 0;
            let lastCheckIn = parseInt(localStorage.getItem('hai_lastCheckIn')) || 0;
            const now = Date.now();
            const streakElement = document.getElementById('streakCount');
            const streakWidget = document.getElementById('streakWidget');

            if (lastCheckIn === 0) { currentStreak = 1; lastCheckIn = now; } 
            else {
                const timePassed = now - lastCheckIn;
                if (timePassed >= STREAK_DAY_MS && timePassed < (STREAK_DAY_MS * 2)) {
                    currentStreak++; lastCheckIn = now;
                    streakWidget.style.transform = 'scale(1.3)'; setTimeout(() => streakWidget.style.transform = 'scale(1)', 400);
                } else if (timePassed >= (STREAK_DAY_MS * 2)) {
                    currentStreak = 1; lastCheckIn = now;
                    streakWidget.style.backgroundColor = "#ffdfe0"; streakWidget.style.borderColor = "#ffb3b3";
                    setTimeout(() => { streakWidget.style.backgroundColor = "#fff3e0"; streakWidget.style.borderColor = "#ffe0b2"; }, 2000);
                }
            }
            localStorage.setItem('hai_streakCount', currentStreak);
            localStorage.setItem('hai_lastCheckIn', lastCheckIn);
            streakElement.innerText = currentStreak;
        }

        loadSavedCourses();
        checkAndUpdateStreak();
    </script>
</body>
</html>
