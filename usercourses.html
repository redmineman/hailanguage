<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiLanguage - My Courses</title>
    <link rel="icon" type="image/png" href="HaiLanguageLogoSmall1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; font-weight: 400; background-color: #fcfcfc; margin: 0; padding: 0; color: #333; padding-bottom: 60px; }
        .content-wrapper { width: 100%; max-width: 900px; margin: 110px auto 0 auto; padding: 0 20px; box-sizing: border-box; }
        
        /* --- Top Header Navigation Bar --- */
        .app-header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 40px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; }
        .logo-link { text-decoration: none; display: inline-block; transition: transform 0.2s ease; }
        .logo-link:hover { transform: scale(1.02); }
        .logo-link img { max-height: 40px; width: auto; display: block; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .streak-container { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; color: #ff9800; background-color: #fff3e0; padding: 8px 16px; border-radius: 20px; border: 2px solid #ffe0b2; transition: transform 0.2s ease; cursor: default; }
        .streak-container:hover { transform: scale(1.05); }
        .streak-icon { font-size: 22px; }
        
        .logout-btn { background-color: transparent; color: #666; border: 2px solid #e5e5e5; border-radius: 20px; padding: 8px 16px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.2s ease; }
        .logout-btn:hover { background-color: #f7f7f7; border-color: #ccc; color: #333; }

        /* --- Split Header Placement Layout --- */
        .title-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .welcome-header { font-size: 36px; font-weight: 700; letter-spacing: -1.5px; margin: 0; color: #111; }
        .welcome-header span { color: #4285f4; }
        .courses-side-title { font-size: 20px; font-weight: 500; color: #666; margin: 0; letter-spacing: -0.5px; }

        .section-header { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin: 40px 0 20px 0; color: #111; }
        
        /* --- Grid Elements --- */
        .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .course-card { background-color: white; border: 2px solid #e5e5e5; border-radius: 20px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: all 0.3s ease; position: relative; overflow: hidden; min-height: 180px; cursor: pointer; }
        .course-icon-bg { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 15px; background-color: #f0f4ff; }
        .course-title { font-size: 20px; font-weight: 600; margin: 0; text-transform: capitalize; }
        .course-card:hover { transform: translateY(-5px); border-color: #4285f4; box-shadow: 0 10px 20px rgba(66, 133, 244, 0.15); }
        
        .course-card.empty-slot { background-color: #f9f9f9; border: 2px dashed #ccc; box-shadow: none; cursor: pointer; }
        .course-card.empty-slot .course-icon-bg { background-color: #fff; border: 2px solid #ccc; color: #ccc; font-size: 28px; }
        .course-card.empty-slot:hover { border-color: #4285f4; background-color: #f0f4ff; transform: translateY(-5px); }
        .course-card.empty-slot:hover .course-icon-bg { border-color: #4285f4; color: #4285f4; }
        
        .course-card.blank-slot { background-color: transparent; border: 2px dashed #e5e5e5; box-shadow: none; cursor: default; }
        .course-card.blank-slot:hover { transform: none; box-shadow: none; border-color: #e5e5e5;}
        
        /* --- Levels Grid --- */
        .levels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .level-card { background-color: white; border: 2px solid #e5e5e5; border-radius: 16px; padding: 25px 20px; text-align: center; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-decoration: none; color: inherit; min-height: 120px; }
        .level-card:hover { border-color: #4285f4; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(66, 133, 244, 0.1); }
        
        .level-icon { font-size: 28px; margin-bottom: 5px; }
        .level-topic { font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .level-name { font-size: 18px; font-weight: 600; color: #111; margin: 0; }
        
        .level-card.blank-slot { background-color: transparent; border: 2px dashed #e5e5e5; box-shadow: none; cursor: default; min-height: 120px; }
        .level-card.blank-slot:hover { transform: none; box-shadow: none; border-color: #e5e5e5; background-color: transparent; }
        
        @media (max-width: 768px) { .app-header { padding: 15px 20px; } .title-row { flex-direction: column; align-items: flex-start; gap: 10px; } .courses-grid { grid-template-columns: 1fr 1fr; } .levels-grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .courses-grid { grid-template-columns: 1fr; } .welcome-header { font-size: 28px; } }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="index.html" class="logo-link"><img src="HaiLanguageLogoFull.png" alt="HaiLanguage Logo"></a>
        <div class="header-actions">
            <div class="streak-container" id="streakWidget" title="Your Daily Streak"><span class="streak-icon">🔥</span><span id="streakCount">0</span></div>
            <button id="logoutBtn" class="logout-btn">Sign Out</button>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="title-row">
            <h1 class="welcome-header">Welcome back, <span id="userGreeting">Learner</span>! 👋</h1>
            <h2 class="courses-side-title">Your Courses</h2>
        </div>

        <div class="courses-grid" id="dynamicCoursesGrid"></div>
        
        <h2 class="section-header">Course Levels</h2>
        <div class="levels-grid" id="dynamicLevelsGrid">
            <div class="level-card blank-slot"></div>
            <div class="level-card blank-slot"></div>
            <div class="level-card blank-slot"></div>
        </div>
    </div>

    <script>
        // Check localStorage first (Remembered), then check sessionStorage (Not remembered)
        const currentUser = localStorage.getItem('hai_currentUser') || sessionStorage.getItem('hai_currentUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userGreeting').innerText = currentUser;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('hai_currentUser');
        sessionStorage.removeItem('hai_currentUser'); // Add this line
        window.location.href = 'index.html';
        });

        function loadSavedCourses() {
            const gridContainer = document.getElementById('dynamicCoursesGrid');
            const savedCourses = JSON.parse(localStorage.getItem('hai_savedCourses')) || [];
            gridContainer.innerHTML = '';
            const coursesToShow = savedCourses.slice(0, 5);

            coursesToShow.forEach(course => {
                gridContainer.innerHTML += `
                    <a href="courseselect.html?topic=${encodeURIComponent(course.topic)}" class="course-card">
                        <div class="course-icon-bg">${course.icon || '📚'}</div>
                        <h3 class="course-title">${course.topic}</h3>
                    </a>
                `;
            });

            gridContainer.innerHTML += `
                <a href="generator.html" class="course-card empty-slot" style="text-decoration: none;">
                    <div class="course-icon-bg">➕</div>
                    <h3 class="course-title" style="color: #666;">Add Course</h3>
                </a>
            `;

            const totalCardsDrawn = coursesToShow.length + 1; 
            for(let i = totalCardsDrawn; i < 6; i++) {
                gridContainer.innerHTML += `<div class="course-card blank-slot"></div>`;
            }
            
            // Generate Random Levels based on saved courses
            loadRandomLevels(savedCourses);
        }

        function loadRandomLevels(savedCourses) {
            const levelsGrid = document.getElementById('dynamicLevelsGrid');
            
            if (!savedCourses || savedCourses.length === 0) {
                return; 
            }

            levelsGrid.innerHTML = '';

            const featuredCourses = savedCourses.slice(0, 3);
            featuredCourses.forEach(course => {
                const courseTitle = course.topic || 'New Course';
                const courseProgress = parseInt(localStorage.getItem('hai_progress_' + courseTitle.toLowerCase())) || 0;
                const nextLevel = Math.min(courseProgress, 4);
                const linkTarget = `course.html?topic=${encodeURIComponent(courseTitle)}&lvl=${nextLevel}`;
                levelsGrid.innerHTML += `
                    <a href="${linkTarget}" class="level-card">
                        <div class="level-icon">${course.icon || '📝'}</div>
                        <p class="level-topic">${courseTitle}</p>
                        <h4 class="level-name">${courseProgress > 0 ? 'Continue Level ' + (nextLevel + 1) : 'Start Level 1'}</h4>
                    </a>
                `;
            });
        }

        const STREAK_UPDATE_MS = 60 * 1000; // 1 minute in milliseconds (for testing)

        function getStreakStorageKey() {
            const activeUser = localStorage.getItem('hai_currentUser') || sessionStorage.getItem('hai_currentUser') || '';
            return activeUser ? `hai_streak_${activeUser.toLowerCase()}` : 'hai_streak_guest';
        }

        function checkAndUpdateStreak() {
            const streakKey = getStreakStorageKey();
            let currentStreak = parseInt(localStorage.getItem(streakKey), 10) || 0;
            let lastCheckIn = parseInt(localStorage.getItem(`${streakKey}_last`), 10) || 0;
            const now = Date.now();
            const streakElement = document.getElementById('streakCount');
            const streakWidget = document.getElementById('streakWidget');

            if (lastCheckIn === 0) {
                currentStreak = 1;
                lastCheckIn = now;
            } else {
                const elapsedMinutes = Math.floor((now - lastCheckIn) / STREAK_UPDATE_MS);

                if (elapsedMinutes >= 1) {
                    currentStreak += elapsedMinutes;
                    lastCheckIn = now;
                    streakWidget.style.transform = 'scale(1.3)';
                    setTimeout(() => streakWidget.style.transform = 'scale(1)', 400);
                }
            }

            localStorage.setItem(streakKey, currentStreak);
            localStorage.setItem(`${streakKey}_last`, lastCheckIn);
            streakElement.innerText = currentStreak;
        }

        loadSavedCourses();
        checkAndUpdateStreak();
        setInterval(checkAndUpdateStreak, STREAK_UPDATE_MS);
    </script>
</body>
</html>
